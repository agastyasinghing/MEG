name: Phase 0A no-fakeredis smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-fakeredis-core-smoke:
    name: Core smoke without fakeredis
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime and focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Assert fakeredis is not installed
        run: |
          python - <<'PY'
          import importlib.util
          import sys

          if importlib.util.find_spec("fakeredis") is not None:
              sys.exit("fakeredis must not be installed in this smoke job")
          PY

      - name: Run no-fakeredis core smoke tests
        run: |
          python -m pytest -q tests/core/test_mock_redis_fixture_skip.py
          python -m pytest -q tests/core/test_event_schema_versioning.py
          python -m pytest -q tests/core/test_canonical_id_normalization.py
          python -m pytest -q tests/core/test_redis_key_contract.py
