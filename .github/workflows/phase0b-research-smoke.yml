name: Phase 0B research smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phase0b-research-tests:
    name: Phase 0B DuckDB research tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Verify DuckDB import
        run: python -c "import duckdb; print(duckdb.__version__)"

      - name: Run Phase 0B research smoke tests
        run: |
          python -m pytest -q tests/research/test_duckdb_loader.py
          python -m pytest -q tests/research/test_lead_lag_queries.py
          python -m pytest -q tests/research/test_fixture_report.py
          python -m pytest -q tests/research/test_fixture_report_cli.py
          python -m pytest -q tests/core/test_static_canonical_ids.py
