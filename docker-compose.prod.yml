# EC2 production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile bot up -d
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile dashboard up -d
#
# Overrides DATABASE_URL and REDIS_URL for BOTH bot and dashboard services.
# ${DATABASE_URL} and ${REDIS_URL} are resolved from the .env file in the
# project directory at compose-parse time (Docker Compose reads .env
# automatically for variable substitution in all -f files).
#
# If these still resolve to localhost values, verify:
#   1. .env on EC2 has the real RDS/ElastiCache URLs (not placeholders)
#   2. Run from the directory containing .env
#   3. Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config
#      and check the resolved DATABASE_URL/REDIS_URL values before starting
#
# Prerequisites on EC2:
#   - .env contains DATABASE_URL pointing to RDS (postgresql+asyncpg://...)
#   - .env contains REDIS_URL pointing to ElastiCache (redis://...)
#   - Alembic migrations have been run: docker compose run --rm bot alembic upgrade head

services:
  bot:
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"

  dashboard:
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
