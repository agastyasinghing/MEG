# MEG Hot-Reloadable Configuration
# All values here are behavioral/tuning parameters.
# Connection strings and secrets come from environment variables (.env), NOT this file.
# Changes to this file take effect within ~1 second without restart.

whale_qualification:
  min_win_rate: 0.55              # Minimum historical win rate to qualify as a whale
  min_closed_positions: 50        # Minimum number of resolved positions
  min_total_volume_usdc: 100000   # Minimum lifetime volume in USDC
  min_profitable_months: 3        # Minimum profitable months in trailing 6
  exclude_archetypes:             # These archetypes are never followed
    - ARBITRAGE
    - MANIPULATOR

signal:
  composite_score_threshold: 0.45 # Minimum composite score to pass to agent_core
  ttl_seconds: 7200               # 2 hours — signals older than this are never executed
  min_whales_for_consensus: 2     # Minimum independent whale agreements for consensus bonus
  composite_weights:
    lead_lag: 0.35                # Primary: is this whale consistently early? (PRD §9.3.9)
    consensus: 0.30               # Multi-whale independent agreement
    kelly: 0.20                   # Kelly confidence (positive expected value)
    divergence: 0.15              # Contrarian vs order flow (contrarian = boost)
  archetype_weights:
    INFORMATION: 1.0              # Full weight — genuine information edge (PRD §9.3.7)
    MOMENTUM: 0.65                # Discounted — trend follower, likely priced in
    ARBITRAGE: 0.0                # Defense-in-depth; should be excluded at Gate 2
    MANIPULATOR: 0.0              # Defense-in-depth; should be excluded at Gate 2
  consensus_window_hours: 4.0     # Rolling window for multi-whale agreement (PRD §9.3.4)
  consensus_sensitivity: 1.5      # Sigmoid sensitivity: higher = sharper 1→2 whale jump
  ladder_conviction_per_rung: 0.15 # Each ladder rung adds 0.15 to multiplier (PRD §9.3.6)
  ttl_half_life_multiplier: 3.0   # TTL = half_life * 3.0 → ~12% edge remaining at expiry
  min_half_life_minutes: 5.0      # Floor: no signal can expire in less than 5 minutes
  lead_lag_min_gate: 0.40         # Drop signal if lead_lag < 0.40 after decay (PRD §9.3.1)
  contrarian_threshold: 0.55      # divergence_score above this → is_contrarian=True

risk:
  max_position_pct: 0.05          # Max single position as fraction of portfolio
  max_daily_loss_usdc: 500        # Hard daily loss limit in USDC
  max_open_positions: 10          # Maximum concurrent open positions
  max_market_exposure_pct: 0.20   # Max exposure to a single market
  paper_trading: true             # Override with PAPER_TRADING env var

kelly:
  fraction: 0.25                  # Use 1/4 Kelly for position sizing (conservative)
  max_bet_usdc: 1000              # Hard cap per trade regardless of Kelly output
  portfolio_value_usdc: 1000.0    # Paper trading starting balance for signal sizing

entry:
  max_entry_distance_pct: 0.05    # Max price drift from whale entry before skipping
  max_spread_pct: 0.03            # Max bid-ask spread to allow entry

pre_filter:
  min_volume_24h_usdc: 50000        # Gate 1: minimum 24-hour trading volume (PRD default)
  min_market_liquidity_usdc: 10000  # Gate 1: minimum liquidity depth within 5 ticks (PRD default)
  max_spread_pct: 0.06              # Gate 1: maximum spread at time of whale trade (PRD default)
  min_unique_participants: 20       # Gate 1: minimum distinct traders in market
  min_days_to_resolution: 3        # Gate 1: skip check if days_to_resolution is None
  arb_detection_window_hours: 24   # Gate 2: YES+NO same-market behavioral arb window
  ladder_window_hours: 6           # Gate 3: SIGNAL_LADDER same-direction trade window
  ladder_min_trades: 2             # Gate 3: prior trades required to qualify as SIGNAL_LADDER
  min_signal_size_pct: 0.02        # Gate 3: min size as fraction of wallet capital for SIGNAL

signal_decay:
  half_life_seconds: 3600          # Signal strength halves every hour
  min_score_after_decay: 0.20      # Drop signal entirely if score falls below this

reputation:
  decay_on_loss: 0.05              # Score penalty per losing trade
  boost_on_win: 0.03               # Score boost per winning trade
  min_score: 0.10                  # Floor — never drop a whale below this
  max_score: 1.00                  # Ceiling
  decay_tau_days: 30.0             # Time constant for exp(-days/tau) reputation decay (PRD §9.3.1)

logging:
  level: INFO                      # DEBUG / INFO / WARNING / ERROR
  format: json                     # json or console
