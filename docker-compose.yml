version: "3.9"

# Usage:
#   docker compose --profile infra up      # Postgres + Redis only (dev default)
#   docker compose --profile bot up        # infra + trading bot
#   docker compose --profile dashboard up  # infra + dashboard API
#   docker compose --profile all up        # everything

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meg}
      POSTGRES_USER: ${POSTGRES_USER:-meg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meg} -d ${POSTGRES_DB:-meg}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m meg.main
    env_file: .env
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles: [bot, all]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn meg.dashboard.api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: [dashboard, all]

volumes:
  postgres_data:
